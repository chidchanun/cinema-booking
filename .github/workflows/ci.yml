name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test -race ./... -count=1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:unit:run
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    env:
      MONGO_ROOT_USERNAME: integration
      MONGO_ROOT_PASSWORD: integration_password
      RABBITMQ_USER: cinema
      RABBITMQ_PASSWORD: cinema_secret
      RUN_INTEGRATION_TESTS: "1"
      MONGO_TEST_URI: mongodb://integration:integration_password@127.0.0.1:27017/?authSource=admin&replicaSet=rs0&directConnection=true
      REDIS_TEST_ADDR: 127.0.0.1:6380
      RABBITMQ_TEST_URL: amqp://cinema:cinema_secret@127.0.0.1:5672/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum
      - run: docker compose up -d --wait
      - name: Run integration tests
        working-directory: backend
        run: go test -tags=integration ./tests/integration -v -count=1
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down -v
